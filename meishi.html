<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const FIELDS = [
  { key: "name",       label: "氏名",   placeholder: "山田 太郎" },
  { key: "company",    label: "会社名", placeholder: "株式会社〇〇" },
  { key: "department", label: "部署",   placeholder: "営業部" },
  { key: "title",      label: "役職",   placeholder: "部長" },
  { key: "email",      label: "メール", placeholder: "taro@example.com" },
  { key: "phone",      label: "電話",   placeholder: "03-0000-0000" },
  { key: "address",    label: "住所",   placeholder: "東京都..." },
];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function loadCards() {
  try { return JSON.parse(localStorage.getItem("meishi_cards") || "[]"); } catch { return []; }
}
function saveCards(cards) {
  localStorage.setItem("meishi_cards", JSON.stringify(cards));
}
function loadApiKey() {
  return localStorage.getItem("meishi_apikey") || "";
}
function saveApiKey(key) {
  localStorage.setItem("meishi_apikey", key);
}

async function extractCardInfo(base64Image, apiKey) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Image } },
          { type: "text", text: 'この名刺画像から情報を抽出してください。必ずJSONのみを返してください。マークダウンや説明文は一切含めないでください。以下の形式で返してください：{"name":"","company":"","department":"","title":"","email":"","phone":"","address":""}' }
        ]
      }]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content?.map(b => b.text || "").join("") || "{}";
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

// ── Avatar ────────────────────────────────────────────────────
function Avatar({ name, size = 40 }) {
  const initials = name ? name.slice(0, 2) : "?";
  const hue = name ? (name.charCodeAt(0) * 37 + (name.charCodeAt(1) || 0) * 19) % 360 : 200;
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `hsl(${hue},50%,60%)`, color: "#fff",
      fontWeight: 700, fontSize: size * 0.38,
      display: "flex", alignItems: "center", justifyContent: "center",
      flexShrink: 0, fontFamily: "'Noto Serif JP', serif"
    }}>{initials}</div>
  );
}

// ── APIキー設定画面 ───────────────────────────────────────────
function ApiKeyView({ onSave }) {
  const [key, setKey] = useState("");
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 24px", background: "#faf8f5" }}>
      <div style={{ fontSize: 48, marginBottom: 20 }}>🔑</div>
      <div style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 20, fontWeight: 700, color: "#1a1208", marginBottom: 8, textAlign: "center" }}>APIキーを設定</div>
      <div style={{ fontSize: 13, color: "#8a7f72", marginBottom: 24, textAlign: "center", lineHeight: 1.7 }}>
        AI読み取り機能にはAnthropicのAPIキーが必要です。<br/>
        キーはこのデバイスにのみ保存されます。
      </div>
      <input
        type="password"
        value={key}
        onChange={e => setKey(e.target.value)}
        placeholder="sk-ant-..."
        style={{ width: "100%", maxWidth: 340, padding: "12px 16px", borderRadius: 12, border: "1px solid #e0dbd2", fontSize: 14, background: "#fff", color: "#2a2018", outline: "none", marginBottom: 16 }}
      />
      <button
        onClick={() => key.trim() && onSave(key.trim())}
        disabled={!key.trim()}
        style={{ width: "100%", maxWidth: 340, background: key.trim() ? "#2a2018" : "#ccc", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, color: "#fff", cursor: key.trim() ? "pointer" : "default", fontWeight: 700 }}
      >設定して始める</button>
      <div style={{ marginTop: 16, fontSize: 12, color: "#b0a89c", textAlign: "center" }}>
        APIキーは <a href="https://console.anthropic.com" target="_blank" style={{ color: "#b5956a" }}>console.anthropic.com</a> で取得できます
      </div>
    </div>
  );
}

// ── 一覧 ──────────────────────────────────────────────────────
function ListView({ cards, onSelect, onScan, onSettings }) {
  const [query, setQuery] = useState("");
  const filtered = cards.filter(c => {
    const q = query.toLowerCase();
    return !q || (c.name||"").toLowerCase().includes(q) || (c.company||"").toLowerCase().includes(q);
  }).sort((a,b) => (a.name||"").localeCompare(b.name||"","ja"));

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "56px 18px 12px", background: "#fff", borderBottom: "1px solid #f0ede8" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 24, fontWeight: 700, color: "#1a1208" }}>名刺帳</div>
          <button onClick={onSettings} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, opacity: 0.5 }}>⚙</button>
        </div>
        <div style={{ position: "relative" }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", opacity: 0.4 }}>
            <circle cx="6.5" cy="6.5" r="5" stroke="#6b5e4e" strokeWidth="1.5"/>
            <path d="M10.5 10.5l3 3" stroke="#6b5e4e" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="名前・会社で検索..."
            style={{ width: "100%", padding: "10px 14px 10px 36px", borderRadius: 12, border: "1px solid #e8e2d8", fontSize: 14, background: "#faf8f5", color: "#2a2018", outline: "none" }} />
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", background: "#faf8f5" }}>
        {filtered.length === 0 ? (
          <div style={{ padding: "60px 20px", textAlign: "center", color: "#b0a89c" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🪪</div>
            <div style={{ fontSize: 15, fontFamily: "'Noto Serif JP', serif" }}>{query ? "該当する名刺がありません" : "名刺がまだありません"}</div>
            {!query && <div style={{ fontSize: 13, marginTop: 8 }}>右下のボタンから追加しましょう</div>}
          </div>
        ) : filtered.map(c => (
          <div key={c.id} onClick={() => onSelect(c)}
            style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", cursor: "pointer", borderBottom: "1px solid #f0ede8", background: "#fff", transition: "background 0.12s" }}
            onTouchStart={e => e.currentTarget.style.background = "#faf8f5"}
            onTouchEnd={e => e.currentTarget.style.background = "#fff"}
          >
            {c.image
              ? <img src={c.image} alt="" style={{ width: 42, height: 42, borderRadius: "50%", objectFit: "cover", flexShrink: 0 }} />
              : <Avatar name={c.name} />
            }
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#1a1208", fontFamily: "'Noto Serif JP', serif", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.name || "（名前なし）"}</div>
              <div style={{ fontSize: 12, color: "#8a7f72", marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{[c.company, c.title].filter(Boolean).join(" · ") || "　"}</div>
            </div>
            <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="#c9c0b4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        ))}
      </div>

      <div style={{ padding: "12px 18px 32px", background: "#fff", borderTop: "1px solid #f0ede8", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "#b0a89c" }}>{cards.length}枚</span>
        <button onClick={onScan} style={{ background: "#2a2018", border: "none", borderRadius: 30, padding: "13px 26px", fontSize: 14, color: "#fff", cursor: "pointer", fontWeight: 700, display: "flex", alignItems: "center", gap: 8, boxShadow: "0 4px 16px rgba(42,32,24,0.3)" }}>
          <span style={{ fontSize: 20, lineHeight: 1 }}>+</span> 名刺を追加
        </button>
      </div>
    </div>
  );
}

// ── 詳細 ──────────────────────────────────────────────────────
function DetailView({ card, onBack, onEdit, onDelete }) {
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#faf8f5" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "56px 18px 12px", background: "#fff", borderBottom: "1px solid #f0ede8" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: "#b5956a", fontSize: 14 }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="#b5956a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          戻る
        </button>
        <span style={{ flex: 1 }} />
        <button onClick={onEdit} style={{ background: "none", border: "1px solid #ddd7ce", borderRadius: 8, padding: "5px 14px", fontSize: 13, color: "#6b5e4e", cursor: "pointer" }}>編集</button>
        <button onClick={onDelete} style={{ background: "none", border: "1px solid #f0c0b0", borderRadius: 8, padding: "5px 14px", fontSize: 13, color: "#c0634a", cursor: "pointer" }}>削除</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "24px 20px" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 28 }}>
          {card.image
            ? <img src={card.image} alt="名刺" style={{ width: "100%", maxWidth: 340, borderRadius: 12, boxShadow: "0 4px 20px rgba(0,0,0,0.1)", marginBottom: 20 }} />
            : <Avatar name={card.name} size={72} />
          }
          <div style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 22, fontWeight: 700, color: "#1a1208", marginTop: card.image ? 0 : 12 }}>{card.name || "（名前なし）"}</div>
          {card.title && <div style={{ fontSize: 13, color: "#8a7f72", marginTop: 4 }}>{card.title}</div>}
          {card.company && <div style={{ fontSize: 14, color: "#6b5e4e", marginTop: 2, fontWeight: 600 }}>{card.company}</div>}
          {card.department && <div style={{ fontSize: 13, color: "#8a7f72" }}>{card.department}</div>}
        </div>

        {[{ icon:"✉", key:"email", label:"メール" }, { icon:"☎", key:"phone", label:"電話" }, { icon:"⌂", key:"address", label:"住所" }].filter(f => card[f.key]).length > 0 && (
          <div style={{ background: "#fff", borderRadius: 14, overflow: "hidden", boxShadow: "0 1px 8px rgba(0,0,0,0.05)", marginBottom: 16 }}>
            {[{ icon:"✉", key:"email", label:"メール" }, { icon:"☎", key:"phone", label:"電話" }, { icon:"⌂", key:"address", label:"住所" }].filter(f => card[f.key]).map((f, i, arr) => (
              <div key={f.key} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 18px", borderBottom: i < arr.length-1 ? "1px solid #f0ede8" : "none" }}>
                <span style={{ fontSize: 18, width: 24, textAlign: "center", opacity: 0.45 }}>{f.icon}</span>
                <div>
                  <div style={{ fontSize: 11, color: "#aaa", marginBottom: 1 }}>{f.label}</div>
                  <div style={{ fontSize: 14, color: "#2a2018" }}>{card[f.key]}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {card.memo && (
          <div style={{ background: "#fff8ee", borderRadius: 14, padding: "16px 18px", marginBottom: 16, border: "1px solid #f0e8d0" }}>
            <div style={{ fontSize: 11, color: "#b5956a", marginBottom: 6, fontWeight: 600 }}>メモ</div>
            <div style={{ fontSize: 14, color: "#4a3c2c", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{card.memo}</div>
          </div>
        )}

        {card.tags?.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {card.tags.map(t => <span key={t} style={{ background: "#f0ede8", borderRadius: 20, padding: "4px 12px", fontSize: 12, color: "#6b5e4e" }}>{t}</span>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── 編集 ──────────────────────────────────────────────────────
function EditView({ card, onSave, onCancel }) {
  const [form, setForm] = useState({ ...card });
  const [tagInput, setTagInput] = useState("");
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const addTag = () => { const t = tagInput.trim(); if (t && !(form.tags||[]).includes(t)) { set("tags", [...(form.tags||[]), t]); setTagInput(""); } };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#faf8f5" }}>
      <div style={{ display: "flex", alignItems: "center", padding: "56px 18px 12px", background: "#fff", borderBottom: "1px solid #f0ede8" }}>
        <button onClick={onCancel} style={{ background: "none", border: "none", cursor: "pointer", color: "#8a7f72", fontSize: 14 }}>キャンセル</button>
        <span style={{ flex: 1, textAlign: "center", fontWeight: 700, fontFamily: "'Noto Serif JP', serif", color: "#1a1208" }}>名刺を編集</span>
        <button onClick={() => onSave(form)} style={{ background: "#b5956a", border: "none", borderRadius: 8, padding: "6px 18px", fontSize: 13, color: "#fff", cursor: "pointer", fontWeight: 700 }}>保存</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 18px" }}>
        {FIELDS.map(f => (
          <div key={f.key} style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 11, color: "#b5956a", fontWeight: 600, display: "block", marginBottom: 4 }}>{f.label}</label>
            <input value={form[f.key]||""} onChange={e => set(f.key, e.target.value)} placeholder={f.placeholder}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e0dbd2", fontSize: 14, background: "#fff", color: "#2a2018", outline: "none" }} />
          </div>
        ))}
        <div style={{ marginBottom: 14 }}>
          <label style={{ fontSize: 11, color: "#b5956a", fontWeight: 600, display: "block", marginBottom: 4 }}>メモ</label>
          <textarea value={form.memo||""} onChange={e => set("memo", e.target.value)} rows={4}
            style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e0dbd2", fontSize: 14, background: "#fff", color: "#2a2018", resize: "vertical", outline: "none" }} />
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ fontSize: 11, color: "#b5956a", fontWeight: 600, display: "block", marginBottom: 4 }}>タグ</label>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <input value={tagInput} onChange={e => setTagInput(e.target.value)} onKeyDown={e => e.key==="Enter" && addTag()} placeholder="タグを追加..."
              style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #e0dbd2", fontSize: 13, outline: "none" }} />
            <button onClick={addTag} style={{ background: "#e8e2d8", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 13, cursor: "pointer", color: "#6b5e4e" }}>追加</button>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {(form.tags||[]).map(t => (
              <span key={t} style={{ background: "#f0ede8", borderRadius: 20, padding: "4px 10px", fontSize: 12, color: "#6b5e4e", display: "flex", alignItems: "center", gap: 4 }}>
                {t}
                <button onClick={() => set("tags", (form.tags||[]).filter(x=>x!==t))} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontSize: 16, color: "#aaa", lineHeight: 1 }}>×</button>
              </span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── スキャン ──────────────────────────────────────────────────
function ScanView({ onBack, onDone, apiKey }) {
  const fileRef = useRef(null);
  const [image, setImage] = useState(null);
  const [base64, setBase64] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [form, setForm] = useState({});

  const handleFile = useCallback(file => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      setImage(e.target.result);
      setBase64(e.target.result.split(",")[1]);
      setResult(null); setError(null);
    };
    reader.readAsDataURL(file);
  }, []);

  const analyze = async () => {
    if (!base64) return;
    setLoading(true); setError(null);
    try {
      const info = await extractCardInfo(base64, apiKey);
      setResult(info); setForm(info);
    } catch(e) {
      setError("読み取りに失敗しました：" + e.message);
    } finally { setLoading(false); }
  };

  const save = () => onDone({ ...form, image, id: generateId(), createdAt: new Date().toISOString(), tags: [] });

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#faf8f5" }}>
      <div style={{ display: "flex", alignItems: "center", padding: "56px 18px 12px", background: "#fff", borderBottom: "1px solid #f0ede8" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#b5956a", fontSize: 14, display: "flex", alignItems: "center", gap: 4 }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="#b5956a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          キャンセル
        </button>
        <span style={{ flex: 1, textAlign: "center", fontWeight: 700, fontFamily: "'Noto Serif JP', serif", color: "#1a1208" }}>名刺を読み取る</span>
        <span style={{ width: 70 }} />
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "20px 18px" }}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />

        {!image ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, paddingTop: 48 }}>
            <div style={{ width: 88, height: 88, borderRadius: "50%", background: "#f0ede8", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40 }}>📷</div>
            <div style={{ fontSize: 15, color: "#6b5e4e", textAlign: "center", lineHeight: 1.6 }}>名刺を撮影または<br/>画像を選択してください</div>
            <button onClick={() => fileRef.current?.click()} style={{ background: "#b5956a", border: "none", borderRadius: 14, padding: "14px 36px", fontSize: 16, color: "#fff", cursor: "pointer", fontWeight: 700, fontFamily: "'Noto Serif JP', serif" }}>
              📷 撮影・選択
            </button>
          </div>
        ) : (
          <>
            <img src={image} alt="名刺" style={{ width: "100%", borderRadius: 12, marginBottom: 16, boxShadow: "0 2px 12px rgba(0,0,0,0.08)" }} />
            <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
              <button onClick={() => { setImage(null); setBase64(null); setResult(null); }} style={{ flex: 1, background: "#e8e2d8", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, cursor: "pointer", color: "#6b5e4e" }}>撮り直す</button>
              <button onClick={analyze} disabled={loading} style={{ flex: 2, background: loading ? "#d4c4a8" : "#b5956a", border: "none", borderRadius: 10, padding: "12px", fontSize: 14, cursor: loading ? "default" : "pointer", color: "#fff", fontWeight: 700 }}>
                {loading ? "⏳ 読み取り中..." : "✨ AI読み取り"}
              </button>
            </div>
            {error && <div style={{ color: "#c05040", fontSize: 13, textAlign: "center", marginBottom: 16, padding: "10px", background: "#fff0ee", borderRadius: 8 }}>{error}</div>}
            {result && (
              <div>
                <div style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 14, fontWeight: 700, color: "#b5956a", marginBottom: 12 }}>読み取り結果を確認・編集</div>
                {FIELDS.map(f => (
                  <div key={f.key} style={{ marginBottom: 12 }}>
                    <label style={{ fontSize: 11, color: "#aaa", display: "block", marginBottom: 3 }}>{f.label}</label>
                    <input value={form[f.key]||""} onChange={e => setForm(x => ({ ...x, [f.key]: e.target.value }))} placeholder={f.placeholder}
                      style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e0dbd2", fontSize: 14, background: "#fff", color: "#2a2018", outline: "none" }} />
                  </div>
                ))}
                <button onClick={save} style={{ width: "100%", background: "#2a2018", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, color: "#fff", cursor: "pointer", fontWeight: 700, marginTop: 8, fontFamily: "'Noto Serif JP', serif" }}>
                  保存する
                </button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── 設定画面 ─────────────────────────────────────────────────
function SettingsView({ onBack, onUpdateKey }) {
  const [key, setKey] = useState(loadApiKey());
  const [saved, setSaved] = useState(false);
  const save = () => { onUpdateKey(key.trim()); setSaved(true); setTimeout(() => setSaved(false), 2000); };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#faf8f5" }}>
      <div style={{ display: "flex", alignItems: "center", padding: "56px 18px 12px", background: "#fff", borderBottom: "1px solid #f0ede8" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: "#b5956a", fontSize: 14 }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="#b5956a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          戻る
        </button>
        <span style={{ flex: 1, textAlign: "center", fontWeight: 700, fontFamily: "'Noto Serif JP', serif", color: "#1a1208" }}>設定</span>
        <span style={{ width: 50 }} />
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "24px 18px" }}>
        <div style={{ background: "#fff", borderRadius: 14, padding: "18px", marginBottom: 16, boxShadow: "0 1px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#b5956a", marginBottom: 10 }}>Anthropic APIキー</div>
          <input type="password" value={key} onChange={e => setKey(e.target.value)} placeholder="sk-ant-..."
            style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #e0dbd2", fontSize: 14, background: "#faf8f5", color: "#2a2018", outline: "none", marginBottom: 12 }} />
          <button onClick={save} style={{ width: "100%", background: saved ? "#6a9e6a" : "#2a2018", border: "none", borderRadius: 10, padding: "11px", fontSize: 14, color: "#fff", cursor: "pointer", fontWeight: 700, transition: "background 0.3s" }}>
            {saved ? "✓ 保存しました" : "保存"}
          </button>
        </div>
        <div style={{ fontSize: 12, color: "#b0a89c", textAlign: "center", lineHeight: 1.7 }}>
          データはすべてこのデバイスのみに保存されます。<br/>
          名刺画像はAI読み取り時のみAnthropicに送信されます。
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [cards, setCards] = useState(loadCards);
  const [apiKey, setApiKey] = useState(loadApiKey);
  const [view, setView] = useState("list");
  const [selected, setSelected] = useState(null);

  useEffect(() => { saveCards(cards); }, [cards]);

  const addCard = card => { setCards(cs => [card, ...cs]); setView("list"); };
  const updateCard = updated => { setCards(cs => cs.map(c => c.id === updated.id ? updated : c)); setSelected(updated); setView("detail"); };
  const deleteCard = id => { if (window.confirm("この名刺を削除しますか？")) { setCards(cs => cs.filter(c => c.id !== id)); setView("list"); setSelected(null); } };
  const handleApiKey = key => { saveApiKey(key); setApiKey(key); setView("list"); };

  if (!apiKey) return (
    <div style={{ width: "100%", maxWidth: 430, margin: "0 auto", height: "100%", background: "#faf8f5" }}>
      <ApiKeyView onSave={handleApiKey} />
    </div>
  );

  return (
    <div style={{ width: "100%", maxWidth: 430, margin: "0 auto", height: "100%", background: "#faf8f5", overflow: "hidden", position: "relative" }}>
      {view === "list"     && <ListView cards={cards} onSelect={c => { setSelected(c); setView("detail"); }} onScan={() => setView("scan")} onSettings={() => setView("settings")} />}
      {view === "scan"     && <ScanView onBack={() => setView("list")} onDone={addCard} apiKey={apiKey} />}
      {view === "detail"   && selected && <DetailView card={selected} onBack={() => setView("list")} onEdit={() => setView("edit")} onDelete={() => deleteCard(selected.id)} />}
      {view === "edit"     && selected && <EditView card={selected} onSave={updateCard} onCancel={() => setView("detail")} />}
      {view === "settings" && <SettingsView onBack={() => setView("list")} onUpdateKey={key => { saveApiKey(key); setApiKey(key); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
